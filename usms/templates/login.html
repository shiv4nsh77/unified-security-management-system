<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>USMS – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; margin-bottom: 6px; color: #1a1a2e; font-size: 22px; }
    .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 5px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #4361ee; }
    button {
      width: 100%;
      background: #4361ee;
      color: white;
      border: none;
      padding: 11px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #3451d1; }
    .error {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      color: #c0392b;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .hint {
      margin-top: 20px;
      background: #f8f9ff;
      border: 1px solid #e0e4ff;
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      color: #555;
      line-height: 1.8;
    }
    .hint strong { color: #4361ee; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 USMS</h2>
    <p class="subtitle">Unified Security Management System</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="admin" required autofocus>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit">Login</button>
    </form>

    <div class="hint">
      <strong>Demo accounts:</strong><br>
      admin / admin123 &nbsp; (Admin)<br>
      alice / alice123 &nbsp;&nbsp; (User)<br>
      charlie / charlie123 (Guest)
    </div>
  </div>
</body>
</html>
